<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PostVelocity - User Login</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .title { 
            text-align: center; 
            margin-bottom: 2rem; 
            color: #333;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .form-group { 
            margin-bottom: 1rem; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #555;
            font-weight: 500;
        }
        input { 
            width: 100%; 
            padding: 0.75rem; 
            border: 2px solid #e1e5e9; 
            border-radius: 0.5rem; 
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { 
            outline: none; 
            border-color: #667eea; 
        }
        .btn { 
            width: 100%; 
            padding: 0.75rem; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 0.5rem; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 1rem;
        }
        .btn:hover { 
            background: #5a67d8; 
        }
        .admin-link {
            text-align: center;
            margin-top: 1rem;
        }
        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .admin-link a:hover {
            text-decoration: underline;
        }
        .notice {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="notice">
            <strong>✅ STANDALONE LOGIN PAGE</strong><br>
            This works independently of React build issues.
        </div>
        <h1 class="title">🚀 PostVelocity User Login</h1>
        <form action="/api/auth/login" method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required value="user@postvelocity.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required value="user123">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="admin-link">
            <a href="/static-admin-login.html">Admin Access →</a>
        </div>
    </div>
</body>
</html>
