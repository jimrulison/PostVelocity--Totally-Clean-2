<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PostVelocity - Admin Login</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .title { 
            text-align: center; 
            margin-bottom: 2rem; 
            color: #333;
            font-size: 1.8rem;
            font-weight: bold;
        }
        .form-group { 
            margin-bottom: 1rem; 
        }
        label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #555;
            font-weight: 500;
        }
        input { 
            width: 100%; 
            padding: 0.75rem; 
            border: 2px solid #e1e5e9; 
            border-radius: 0.5rem; 
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { 
            outline: none; 
            border-color: #ff6b6b; 
        }
        .btn { 
            width: 100%; 
            padding: 0.75rem; 
            background: #ff6b6b; 
            color: white; 
            border: none; 
            border-radius: 0.5rem; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 1rem;
        }
        .btn:hover { 
            background: #ee5a52; 
        }
        .user-link {
            text-align: center;
            margin-top: 1rem;
        }
        .user-link a {
            color: #ff6b6b;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .user-link a:hover {
            text-decoration: underline;
        }
        .test-creds {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .notice {
            background: #fff3e0;
            border: 1px solid #ffcc02;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #f57c00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="notice">
            <strong>✅ STANDALONE ADMIN LOGIN</strong><br>
            This works independently of React build issues.
        </div>
        <h1 class="title">🔐 Admin Access</h1>
        <div class="test-creds">
            <strong>Test Credentials:</strong><br>
            Email: admin@postvelocity.com<br>
            Password: admin123
        </div>
        <form action="/api/auth/admin-login" method="post">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" name="email" required value="admin@postvelocity.com">
            </div>
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" required value="admin123">
            </div>
            <button type="submit" class="btn">Admin Login</button>
        </form>
        <div class="user-link">
            <a href="/static-user-login.html">← Back to User Login</a>
        </div>
    </div>
</body>
</html>
